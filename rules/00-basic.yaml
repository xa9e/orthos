rules:
- id: ru.typography.multiple_spaces
  title: Не более одного пробела внутри строки
  domain: typography
  level: basic
  status: implemented
  severity: warning
  source_refs:
  - gramota_lopatin_full
  detector:
    kind: multiple_spaces
    message: 'Лишний пробел: внутри строки обычно нужен один пробел.'
    replacement: ' '
  examples:
    valid:
    - Это нормальный текст.
    invalid:
    - Это  текст с  лишними пробелами.
  requires:
  - regex
  confidence: high
  false_positive_risk: low
- id: ru.punctuation.no_space_before_mark
  title: Нет пробела перед запятой, точкой, двоеточием, точкой с запятой, вопросительным и восклицательным знаком
  domain: punctuation
  level: basic
  status: implemented
  severity: error
  source_refs:
  - gramota_lopatin_full
  - gramota_rules_1956
  detector:
    kind: no_whitespace_before_punctuation
    punctuation: ',.;:!?'
    message: Перед этим знаком препинания пробел не ставится.
  examples:
    valid:
    - Привет, мир!
    invalid:
    - Привет , мир !
  requires:
  - tokenization
  confidence: high
  false_positive_risk: low
- id: ru.grammar.repeated_word
  title: Случайный повтор соседнего слова
  domain: grammar
  level: basic
  status: implemented
  severity: warning
  source_refs:
  - editorial_style_general
  detector:
    kind: repeated_word
    message: Похоже на случайный повтор слова.
  examples:
    valid:
    - Это очень важный текст.
    invalid:
    - Это это очень важный текст.
  requires:
  - tokenization
  confidence: medium
  false_positive_risk: medium
- id: ru.punctuation.sentence_terminal
  title: Предложение обычно заканчивается знаком конца предложения
  domain: punctuation
  level: basic
  status: implemented
  severity: warning
  source_refs:
  - gramota_lopatin_full
  detector:
    kind: missing_sentence_terminal
    message: Текст не заканчивается знаком конца предложения.
    replacement: .
  examples:
    valid:
    - Сегодня холодно.
    invalid:
    - Сегодня холодно
  requires:
  - sentence_boundaries
  confidence: medium
  false_positive_risk: medium
- id: ru.orthography.sentence_initial_capital
  title: Первое слово предложения пишется с прописной буквы
  domain: orthography
  level: basic
  status: implemented
  severity: warning
  source_refs:
  - gramota_rules_1956
  - gramota_lopatin_full
  detector:
    kind: sentence_initial_lowercase
    message: Первое слово предложения обычно пишется с прописной буквы.
  examples:
    valid:
    - Дом построен. Сад посажен.
    invalid:
    - дом построен. сад посажен.
  requires:
  - sentence_boundaries
  - tokenization
  confidence: medium
  false_positive_risk: medium
- id: ru.punctuation.unbalanced_guillemets
  title: Парность русских кавычек «ёлочки»
  domain: punctuation
  level: basic
  status: implemented
  severity: warning
  source_refs:
  - gramota_lopatin_full
  detector:
    kind: unbalanced_quotes
    message: Кавычки выглядят непарными.
  examples:
    valid:
    - 'Он сказал: «Пора».'
    invalid:
    - 'Он сказал: «Пора.'
  requires:
  - tokenization
  confidence: high
  false_positive_risk: low
